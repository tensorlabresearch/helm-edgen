name: Chart Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint --strict charts/edgen

      - name: Helm template (default values)
        run: helm template edgen charts/edgen > /tmp/edgen-default.yaml

      - name: Helm template (preload-heavy values)
        run: |
          cat > /tmp/edgen-preload-values.yaml <<'YAML'
          gpu:
            enabled: false
          modelPreload:
            enabled: true
            continueOnError: false
            items:
              - id: custom-chat-model
                url: https://example.com/chat.gguf
                filename: chat.gguf
                targetSubdir: edgen/chat/completions
                sha256: ""
          YAML
          helm template edgen charts/edgen -f /tmp/edgen-preload-values.yaml > /tmp/edgen-preload.yaml

      - name: Validate rendered preload and GPU manifests
        run: |
          grep -q "initContainers:" /tmp/edgen-preload.yaml
          grep -q "sha256sum -c -" /tmp/edgen-preload.yaml
          grep -q "nvidia.com/gpu" /tmp/edgen-default.yaml
          grep -q "edgen.conf.yaml" /tmp/edgen-default.yaml

  release:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: Configure git user for gh-pages index updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Package chart
        run: |
          rm -rf .cr-release-packages
          mkdir -p .cr-release-packages
          cr package charts/edgen --package-path .cr-release-packages

      - name: Upload chart release assets
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cr upload \
            --owner tensorlabresearch \
            --git-repo helm-edgen \
            --token "${CR_TOKEN}" \
            --skip-existing \
            --commit "$(git rev-parse HEAD)" \
            --pages-branch gh-pages

      - name: Update gh-pages index
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .cr-index
          cr index \
            --owner tensorlabresearch \
            --git-repo helm-edgen \
            --token "${CR_TOKEN}" \
            --push \
            --pages-branch gh-pages

      - name: Resolve chart metadata
        id: chart
        run: |
          chart_name="edgen"
          chart_version="$(awk '/^version:/ {print $2; exit}' charts/edgen/Chart.yaml)"
          chart_package=".cr-release-packages/${chart_name}-${chart_version}.tgz"
          echo "name=${chart_name}" >> "$GITHUB_OUTPUT"
          echo "version=${chart_version}" >> "$GITHUB_OUTPUT"
          echo "package=${chart_package}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for OCI chart push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Push chart to GHCR OCI (skip when version already exists)
        id: oci
        run: |
          set -euo pipefail
          chart_ref="oci://ghcr.io/tensorlabresearch/charts/${{ steps.chart.outputs.name }}"
          chart_version="${{ steps.chart.outputs.version }}"
          chart_package="${{ steps.chart.outputs.package }}"

          if helm show chart "${chart_ref}" --version "${chart_version}" >/dev/null 2>&1; then
            echo "OCI chart ${chart_ref}:${chart_version} already exists; skipping push."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          helm push "${chart_package}" oci://ghcr.io/tensorlabresearch/charts
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Ensure GHCR OCI chart package is public
        if: steps.oci.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/tensorlabresearch/packages/container/charts%2Fedgen/visibility \
            -f visibility=public

      - name: Ensure GHCR image package is public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /orgs/tensorlabresearch/packages/container/edgen/visibility \
            -f visibility=public

      - name: Release summary
        run: |
          {
            echo "### Chart Release"
            echo ""
            echo "- Chart: \`${{ steps.chart.outputs.name }}\`"
            echo "- Version: \`${{ steps.chart.outputs.version }}\`"
            echo "- OCI pushed this run: \`${{ steps.oci.outputs.pushed }}\`"
            echo "- OCI base: \`oci://ghcr.io/tensorlabresearch/charts\`"
            echo "- Pages repo: \`https://tensorlabresearch.github.io/helm-edgen\`"
          } >> "$GITHUB_STEP_SUMMARY"
