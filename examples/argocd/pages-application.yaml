apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edgen-pages
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: edgen
  source:
    repoURL: https://tensorlabresearch.github.io/helm-edgen
    chart: edgen
    targetRevision: 0.1.6
    helm:
      values: |
        gpu:
          enabled: true
          count: 1
          resourceKey: nvidia.com/gpu
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
